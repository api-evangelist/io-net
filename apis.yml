aid: io-net
name: io.net
description: >-
  io.net is a decentralized GPU network for AI compute, built on Solana, that
  aggregates idle consumer and data-center GPUs (NVIDIA A100, H100, H200, and
  Blackwell-class) into on-demand, geo-distributed compute clusters orchestrated
  with the Ray framework. The platform exposes a Web3-native alternative to
  hyperscaler GPU cloud through several developer-facing surfaces: IO
  Intelligence (an OpenAI-compatible inference API for 15+ open-source models
  including Llama 3.3 70B), IO Cloud (Container-as-a-Service and VM-as-a-Service
  APIs for deploying GPU containers, Ray clusters, Kubernetes clusters, and
  bare-metal instances), IO Agents (agent and agentic-workflow APIs), IO
  Explorer (a network analytics API for devices, clusters, and block rewards),
  IO Worker (the supplier-side onboarding stack), IO ID (the account/wallet
  hub), and IO Staking. Confidential Compute on Intel TDX-enabled H100/H200/B200
  GPUs and a remote attestation service for Intel TDX and NVIDIA H200
  confidential VMs round out the security surface. The IO token is an SPL token
  on Solana used for settlement, staking, and rewards; fiat and USDC payments
  are accepted and converted to IO. io.net also publishes an MCP server at
  mcp.io.solutions for agent-driven cluster provisioning. The platform's tagline
  is "the open-source AI infrastructure platform" and its commercial pitch is
  AI compute at 50–70% below comparable hyperscaler rates.
