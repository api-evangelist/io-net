apis:
  - aid: io-net:io-intelligence-api
    name: IO Intelligence API
    description: >-
      OpenAI-compatible inference API for open-source AI models hosted on
      io.net's decentralized GPU network. Exposes /v1/models and
      /v1/chat/completions over the base URL
      https://api.intelligence.io.solutions/api/v1, accepts Bearer-token
      authentication, and supports streaming, vision (image upload), reasoning
      content, and a shared usage pool across 15+ models including
      meta-llama/Llama-3.3-70B-Instruct. Designed as a drop-in replacement for
      the OpenAI SDK — install `openai` (Python or Node.js) and point base_url
      at api.intelligence.io.solutions.
    humanURL: https://io.net/docs/guides/intelligence/io-intelligence-apis
    baseURL: https://api.intelligence.io.solutions/api/v1
    tags:
      - AI
      - Inference
      - LLM
      - OpenAI-compatible
      - Chat Completions
      - Vision
      - Streaming
    properties:
      - type: Documentation
        url: https://io.net/docs/guides/intelligence/io-intelligence-apis
      - type: Documentation
        url: https://io.net/docs/reference/ai-models/get-started-with-io-intelligence-api
      - type: Portal
        url: https://ai.io.net
      - type: SignUp
        url: https://ai.io.net/ai/api-keys
      - type: Authentication
        url: https://io.net/docs/guides/intelligence/io-intelligence-apis
  - aid: io-net:io-agents-api
    name: IO Agents API
    description: >-
      REST API for discovering, configuring, and running AI agents and
      agentic workflows on io.net's no-code workflow editor. Supports agent
      discovery, workflow execution, workflow-schema retrieval, and CRUD on
      per-agent secrets.
    humanURL: https://io.net/docs/guides/intelligence
    tags:
      - AI
      - Agents
      - Workflows
      - Automation
    properties:
      - type: Documentation
        url: https://io.net/docs/guides/intelligence
      - type: Documentation
        url: https://io.net/docs/guides/clouds/agent-cloud
  - aid: io-net:io-cloud-caas-api
    name: IO Cloud Container-as-a-Service API
    description: >-
      Container-as-a-Service REST API for deploying GPU-backed containers
      across io.net's decentralized network. Operations include container
      deployment and termination, real-time log streaming, replica
      availability and capacity checks per GPU hardware type, deployment
      configuration updates, and price estimation. Backed by the same
      orchestration layer that powers IO Cloud's Ray and Kubernetes options.
    humanURL: https://io.net/docs/guides/clouds/io-cloud
    tags:
      - GPU
      - Containers
      - CaaS
      - Deployment
      - Distributed Computing
    properties:
      - type: Documentation
        url: https://io.net/docs/guides/clouds/io-cloud
      - type: Documentation
        url: https://docs.io.net/docs/start-using-io-cloud
  - aid: io-net:io-cloud-vmaas-api
    name: IO Cloud VM-as-a-Service API
    description: >-
      VM-as-a-Service REST API for provisioning, extending, and terminating
      GPU virtual machines on io.net. Surfaces hardware availability and
      pricing, supports multi-VM cluster orchestration, and exposes job
      history for billing and audit.
    humanURL: https://io.net/docs/guides/clouds/io-cloud
    tags:
      - GPU
      - VMs
      - Compute
      - Bare Metal
      - Clusters
    properties:
      - type: Documentation
        url: https://io.net/docs/guides/clouds/io-cloud
      - type: Documentation
        url: https://docs.io.net/docs/deploy-ray-cluster
  - aid: io-net:io-explorer-api
    name: IO Explorer API
    description: >-
      Network analytics API exposing device summaries and detailed metrics,
      block-reward analysis, proof-of-work challenge tracking, and device
      notifications. Powers the public IO Explorer dashboard and is suitable
      for partner monitoring and on-chain reward attestation.
    humanURL: https://explorer.io.net
    tags:
      - Analytics
      - Monitoring
      - DePIN
      - Block Rewards
      - Proof of Work
    properties:
      - type: Documentation
        url: https://io.net/docs
      - type: Dashboard
        url: https://explorer.io.net
  - aid: io-net:io-sub-api-key-api
    name: IO Sub-API Key Management API
    description: >-
      Administrative API for creating scoped sub-API keys with per-model
      restrictions and per-key credit limits, tracking usage and aggregated
      spend, and revoking keys. Designed for teams and partners reselling or
      proxying io.net inference.
    humanURL: https://ai.io.net/ai/api-keys
    tags:
      - Administrative
      - API Keys
      - Access Control
      - FinOps
    properties:
      - type: Documentation
        url: https://io.net/docs/guides/intelligence/io-intelligence-apis
      - type: Portal
        url: https://ai.io.net/ai/api-keys
  - aid: io-net:io-cloud-mcp-server
    name: IO Cloud MCP Server
    description: >-
      Hosted Model Context Protocol server at https://mcp.io.solutions/mcp
      that exposes IO Cloud provisioning and management tools to MCP-aware
      agents (Claude Desktop, Claude Code, Cursor, etc.). Authenticates via
      the `x-api-key` header using an io.net API key with io-cloud project
      scope.
    humanURL: https://io.net/docs/guides/clouds/agent-cloud
    baseURL: https://mcp.io.solutions/mcp
    tags:
      - MCP
      - Agents
      - GPU
      - Tool Use
    properties:
      - type: Documentation
        url: https://io.net/docs/guides/clouds/agent-cloud
  - aid: io-net:cc-attestation-agent-api
    name: Confidential Compute Attestation Agent API
    description: >-
      Open-source FastAPI remote attestation service for Intel TDX and NVIDIA
      H200 confidential VMs operating on the io.net network. Issues
      verifiable cryptographic attestations that a workload is running inside
      a Trusted Execution Environment with the expected firmware and GPU
      state. Source published at github.com/ionet-official/cc-attestation-agent-api
      under MIT.
    humanURL: https://github.com/ionet-official/cc-attestation-agent-api
    tags:
      - Confidential Compute
      - Attestation
      - Security
      - Intel TDX
      - NVIDIA H200
      - TEE
    properties:
      - type: SourceCode
        url: https://github.com/ionet-official/cc-attestation-agent-api
      - type: Documentation
        url: https://io.net/docs
